name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Frontend Folder
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend 
          branch: gh-pages 